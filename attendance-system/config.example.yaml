env: development
http_port: 8085
postgres_dsn: "postgres://attendance:attendance@localhost:5432/attendance_db?sslmode=disable"
attendance_sync_cron: "*/15 * * * *"
jwt_secret: "change-me-in-production"

# Đồng bộ log qua SDK khi thiết bị tắt ADMS.
sdk:
  attendance_poll_interval_seconds: 2
  connect_timeout_seconds: 8
  max_retries: 2

# Chính sách tính công. ±1 giờ chỉ là cửa sổ nhận diện log, không phải giờ được trả công.
attendance:
  shift_window_before_minutes: 60
  shift_window_after_minutes: 60
  overtime_requires_approval: true
  overtime_requires_device_log: true
  overtime_log_grace_minutes: 15

# Thông báo chấm công (có thể cấu hình bằng biến ATTENDANCE_NOTIFICATIONS_...)
notifications:
  enabled: true
  email_enabled: true
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  smtp_username: "your-account@gmail.com"
  smtp_password: "your-app-password"
  smtp_from: "your-account@gmail.com"
  zalo_enabled: false
  zalo_api_url: "https://openapi.zalo.me/v3.0/oa/message/cs"
  zalo_access_token: ""
  instant_max_age_minutes: 10
  checkout_grace_minutes: 30
